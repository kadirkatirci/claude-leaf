<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Productivity</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-content">
        <div class="header-left">
          <img src="../icons/icon48.png" alt="Logo" class="header-logo">
          <h1>Claude Productivity</h1>
        </div>
        <span class="version" id="version"></span>
      </div>
    </header>

    <!-- Tabs - Generated from JS -->
    <nav class="tabs" id="tabs-nav"></nav>

    <!-- Tab Contents -->
    <main class="tab-contents">
      <div class="tab-content active" id="tab-features">
        <div class="feature-list" id="feature-list"></div>
      </div>

      <!-- 
      <div class="tab-content" id="tab-shortcuts">
        <div class="shortcuts-list" id="shortcuts-list"></div>
      </div>
      -->

      <div class="tab-content" id="tab-data">
        <div class="data-section" id="data-section"></div>
      </div>

      <div class="tab-content" id="tab-settings">
        <div class="settings-accordion" id="settings-accordion"></div>
        <div class="settings-footer">
          <button class="btn btn-secondary" id="reset-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
            Reset All to Defaults
          </button>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="popup-footer">
      <button class="btn btn-primary" id="save-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        Save
      </button>
    </footer>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip hidden"></div>
  </div>

  <script src="dataService.js"></script>
  <script src="popup.js"></script>
</body>

</html>
