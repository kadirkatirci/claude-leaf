<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storage Migration - Claude Productivity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 40px;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }

    .section h2 {
      font-size: 18px;
      color: #555;
      margin-bottom: 12px;
    }

    .status {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: white;
      border-radius: 4px;
    }

    .status.success {
      color: #10b981;
      background: #d1fae5;
    }

    .status.error {
      color: #ef4444;
      background: #fee2e2;
    }

    .status.warning {
      color: #f59e0b;
      background: #fef3c7;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      margin-top: 12px;
    }

    .logs {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Storage Migration Tool</h1>
    <p style="color: #666; margin-bottom: 30px;">
      This tool will migrate your data from old storage format to the new centralized store format.
    </p>

    <div class="section">
      <h2>📊 Current Storage Status</h2>
      <div id="status-info"></div>
    </div>

    <div class="section">
      <h2>🔖 Bookmarks Migration</h2>
      <div id="bookmarks-status"></div>
      <button id="migrate-bookmarks">Migrate Bookmarks</button>
    </div>

    <div class="section">
      <h2>📍 Emoji Markers Migration</h2>
      <div id="markers-status"></div>
      <button id="migrate-markers">Migrate Emoji Markers</button>
    </div>

    <div class="section">
      <h2>⚙️ Settings Migration</h2>
      <div id="settings-status"></div>
      <button id="migrate-settings">Migrate Settings</button>
    </div>

    <div class="section">
      <h2>🚀 Full Migration</h2>
      <p style="color: #666; margin-bottom: 10px;">
        Migrate all data at once (recommended)
      </p>
      <button id="migrate-all" style="background: #10b981;">Migrate All Data</button>
    </div>

    <div class="logs" id="logs"></div>
  </div>

  <script src="migrate-storage.js"></script>
</body>
</html>
