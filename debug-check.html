<!DOCTYPE html>
<html>
<head>
  <title>Debug Extension</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h1 { color: #4ec9b0; }
    button { background: #0e639c; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
    button:hover { background: #1177bb; }
    pre { background: #2d2d2d; padding: 15px; border-radius: 4px; overflow: auto; }
    .success { color: #4ec9b0; }
    .error { color: #f48771; }
    .warning { color: #dcdcaa; }
  </style>
</head>
<body>
  <h1>🔍 Extension Debug Console</h1>
  
  <h2>Quick Actions:</h2>
  <button onclick="checkApp()">Check App Status</button>
  <button onclick="checkModules()">Check Modules</button>
  <button onclick="checkVisibility()">Check Visibility System</button>
  <button onclick="checkButtons()">Check Fixed Buttons</button>
  <button onclick="clearConsole()">Clear</button>
  
  <h2>Output:</h2>
  <pre id="output">Click a button to run diagnostics...</pre>

  <script>
    const output = document.getElementById('output');
    
    function log(msg, type = 'info') {
      const className = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : '';
      output.innerHTML += `<div class="${className}">${msg}</div>`;
    }
    
    function clearConsole() {
      output.innerHTML = '';
    }
    
    async function checkApp() {
      clearConsole();
      log('='.repeat(60), 'success');
      log('APP STATUS CHECK', 'success');
      log('='.repeat(60), 'success');
      
      if (!window.claudeProductivity) {
        log('❌ window.claudeProductivity not found!', 'error');
        log('Extension may not be loaded or initialized', 'error');
        return;
      }
      
      log('✅ App object found', 'success');
      
      const debugInfo = await window.claudeProductivity.getDebugInfo();
      log('\n📊 App Info:', 'success');
      log(JSON.stringify(debugInfo, null, 2));
    }
    
    async function checkModules() {
      clearConsole();
      log('='.repeat(60), 'success');
      log('MODULES CHECK', 'success');
      log('='.repeat(60), 'success');
      
      if (!window.claudeProductivity) {
        log('❌ App not found!', 'error');
        return;
      }
      
      const modules = ['navigation', 'editHistory', 'compactView', 'bookmarks', 'emojiMarkers', 'sidebarCollapse', 'contentFolding'];
      
      for (const name of modules) {
        const module = window.claudeProductivity.getModule(name);
        if (module) {
          log(`✅ ${name}: enabled=${module.enabled}, initialized=${!!module.elements}`, 'success');
        } else {
          log(`❌ ${name}: NOT FOUND`, 'error');
        }
      }
    }
    
    function checkVisibility() {
      clearConsole();
      log('='.repeat(60), 'success');
      log('VISIBILITY SYSTEM CHECK', 'success');
      log('='.repeat(60), 'success');
      
      const buttons = [
        { name: 'Navigation', id: 'claude-nav-buttons' },
        { name: 'Edit History', id: 'claude-edit-fixed-btn' },
        { name: 'Compact View', id: 'compact-view-buttons' },
        { name: 'Bookmarks', id: 'claude-bookmarks-fixed-btn' },
        { name: 'Emoji Markers', id: 'claude-marker-fixed-btn' }
      ];
      
      buttons.forEach(({ name, id }) => {
        const btn = document.getElementById(id);
        if (btn) {
          const computed = window.getComputedStyle(btn);
          const visible = computed.display !== 'none' && computed.visibility !== 'hidden' && computed.opacity !== '0';
          log(`${visible ? '✅' : '⚠️'} ${name}: display=${computed.display}, visibility=${computed.visibility}, opacity=${computed.opacity}`, visible ? 'success' : 'warning');
        } else {
          log(`❌ ${name}: Button NOT FOUND in DOM`, 'error');
        }
      });
    }
    
    function checkButtons() {
      clearConsole();
      log('='.repeat(60), 'success');
      log('FIXED BUTTONS CHECK', 'success');
      log('='.repeat(60), 'success');
      
      const allButtons = document.querySelectorAll('[id*="claude"], [id*="fixed"], [class*="claude"]');
      log(`Found ${allButtons.length} elements with 'claude' or 'fixed' in id/class:\n`);
      
      allButtons.forEach(btn => {
        const computed = window.getComputedStyle(btn);
        log(`- ${btn.id || btn.className}: display=${computed.display}, visibility=${computed.visibility}`, 'info');
      });
    }
  </script>
</body>
</html>
