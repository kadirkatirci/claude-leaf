<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks - Claude Productivity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats {
      display: flex;
      gap: 20px;
      color: #666;
      font-size: 14px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bookmarks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .bookmark-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      border-left: 4px solid #667eea;
    }

    .bookmark-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .bookmark-preview {
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .bookmark-date {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .delete-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .delete-btn:hover {
      background: #ee2f41;
      transform: scale(1.05);
    }

    .empty-state {
      background: white;
      padding: 60px;
      border-radius: 12px;
      text-align: center;
      color: #666;
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #333;
    }

    .search-bar {
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .bookmark-note {
      font-size: 13px;
      color: #667eea;
      font-style: italic;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <span>🔖</span>
        <span>My Bookmarks</span>
      </h1>
      <div class="stats">
        <div class="stat-item">
          <span>📚</span>
          <span id="total-count">0 bookmarks</span>
        </div>
      </div>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="🔍 Search bookmarks..."
      >
    </div>

    <div id="bookmarks-container" class="bookmarks-grid">
      <!-- Bookmarks will be inserted here -->
    </div>
  </div>

  <script src="bookmarks.js"></script>
</body>
</html>
