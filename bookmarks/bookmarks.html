<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks - Claude Productivity</title>
  <style>
    :root {
      --bg-primary: #f8fafe;
      --bg-secondary: #ffffff;
      --text-primary: #333;
      --text-secondary: #666;
      --accent: #667eea;
      --accent-hover: #5a6fd6;
      --border: #e0e0e0;
      --danger: #ff4757;
      --sidebar-width: 260px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .categories-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .category-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
      color: var(--text-secondary);
      position: relative;
    }

    .category-item:hover {
      background: #f3f4f6;
      color: var(--text-primary);
    }

    .category-item.active {
      background: #eff3ff;
      color: var(--accent);
      font-weight: 500;
    }

    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .category-count {
      margin-left: auto;
      font-size: 12px;
      opacity: 0.7;
    }

    .delete-cat-btn {
      margin-left: 8px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.3;
      font-size: 14px;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .category-item:hover .delete-cat-btn {
      opacity: 0.7;
    }

    .delete-cat-btn:hover {
      opacity: 1 !important;
      background: #ffe5e5;
      color: var(--danger);
    }

    .new-category-btn {
      margin: 16px;
      padding: 10px;
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .new-category-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #f8fafe;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .main-header {
      padding: 24px 32px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
      width: 300px;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px 10px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }

    .filter-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .current-category-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Grid */
    .bookmarks-container {
      padding: 32px;
      overflow-y: auto;
      height: 100%;
    }

    .bookmarks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
      padding-bottom: 40px;
    }

    .bookmark-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
      border: 1px solid transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .bookmark-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      border-color: var(--border);
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f5f5f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .card-body {
      padding: 20px;
      flex: 1;
    }

    .bookmark-preview {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .read-more {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      margin-top: 8px;
      display: inline-block;
      font-weight: 500;
    }

    .read-more:hover {
      text-decoration: underline;
    }

    .card-footer {
      padding: 16px 20px;
      background: #fcfcfc;
      border-top: 1px solid #f5f5f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #888;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      color: #888;
      transition: all 0.2s;
      font-size: 14px;
    }

    .action-btn:hover {
      background: #f0f0f0;
      color: #333;
    }

    .action-btn.delete:hover {
      background: #fff0f0;
      color: var(--danger);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-lg {
      max-width: 800px;
      height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .modal h2 {
      margin-bottom: 20px;
      font-size: 20px;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🔖 Bookmarks</h1>
    </div>

    <div class="categories-list" id="category-list">
      <!-- Categories rendered here -->
    </div>

    <button class="new-category-btn" id="btn-new-category">
      <span>+</span> New Category
    </button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="main-header">
      <div class="filter-info">
        <div class="current-category-title" id="current-category-title">All Bookmarks</div>
      </div>

      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Search bookmarks...">
      </div>
    </div>

    <div class="bookmarks-container">
      <div id="bookmarks-grid" class="bookmarks-grid">
        <!-- Bookmark Cards -->
      </div>
    </div>
  </div>

  <!-- New Category Modal -->
  <div class="modal-overlay" id="category-modal">
    <div class="modal">
      <h2 id="modal-title">New Category</h2>
      <div class="form-group">
        <label>Category Name</label>
        <input type="text" class="form-input" id="cat-name-input" placeholder="e.g. Work, Ideas">
      </div>
      <div class="form-group">
        <label>Color</label>
        <input type="color" id="cat-color-input" value="#667eea" style="width: 100%; height: 40px; padding: 2px;">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-category">Cancel</button>
        <button class="btn btn-primary" id="btn-save-category">Save Category</button>
      </div>
    </div>
  </div>

  <!-- Full Text Modal -->
  <div class="modal-overlay" id="fulltext-modal">
    <div class="modal modal-lg">
      <h2 id="fulltext-title">Message Content</h2>
      <div class="modal-body" id="fulltext-content"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-close-fulltext">Close</button>
        <button class="btn btn-primary" id="fulltext-goto-btn">Go to Message</button>
      </div>
    </div>
  </div>

  <script src="bookmarks.js"></script>
</body>

</html>
